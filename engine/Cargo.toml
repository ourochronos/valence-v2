[package]
name = "valence-engine"
version = "0.1.0"
edition = "2021"
description = "Triple-based knowledge substrate with topology-derived embeddings"
license = "MIT"

[dependencies]
# Graph storage
kuzu = "0.11"
# In-memory graph algorithms  
petgraph = "0.7"
# HTTP server
axum = { version = "0.8", features = ["json"] }
tokio = { version = "1", features = ["full"] }
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Linear algebra for spectral embeddings
# faer = "0.20"
# Error handling
thiserror = "2"
anyhow = "1"
# Logging
tracing = "0.1"
tracing-subscriber = "0.3"
# UUID for triple IDs
uuid = { version = "1", features = ["v4", "serde"] }
# Timestamps
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
